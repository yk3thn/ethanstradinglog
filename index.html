<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade Tracker Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

<style>
body { background:#0e0e0e; color:#e0e0e0; font-family:'Cascadia Code', monospace; margin:0;}
.nav { display:flex; background:#181818;}
.nav button { flex:1; padding:15px; border:none; background:none; color:#aaa; cursor:pointer;}
.nav button.active { color:white; border-bottom:2px solid #4CAF50;}
.page { display:none; padding:25px;}
.page.active { display:block;}
.card { background:#181818; padding:20px; border-radius:12px; border:1px solid #2a2a2a; margin-bottom:20px;}
.form-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
input,select { padding:10px; border-radius:6px; border:1px solid #333; background:#111; color:white;}
.add-btn { grid-column:span 4; background:#4CAF50; border:none; padding:12px; cursor:pointer;}
.balance-btn { grid-column:span 4; background:#2196F3; border:none; padding:12px; cursor:pointer;}
canvas { height:400px !important;}
</style>
</head>

<body>

<div class="nav">
<button class="active" onclick="switchPage('dashboard',this)">Dashboard</button>
<button onclick="switchPage('analytics',this)">Analytics</button>
</div>

<div id="dashboard" class="page active">

<div class="card">
<div class="form-grid">

<input id="ticker" placeholder="Ticker">
<input id="entry" type="number" placeholder="Entry">
<input id="exit" type="number" placeholder="Exit">
<input id="qty" type="number" placeholder="Qty">

<input id="date" type="date">
<input id="time" type="time">

<button class="add-btn" onclick="addTrade()">Add Trade</button>

<input id="balanceAmount" type="number" placeholder="Deposit / Withdraw">
<button class="balance-btn" onclick="addBalance()">Add Balance</button>

</div>
</div>

<div class="card">
<table><tbody id="tradeTable"></tbody></table>
</div>

</div>

<div id="analytics" class="page">
<div class="card">

<select id="interval" onchange="drawChart()">
<option value="trade">Per Trade</option>
<option value="hour">Hourly</option>
<option value="day">Daily</option>
<option value="week">Weekly</option>
<option value="month">Monthly</option>
</select>

<input type="date" id="hourFilter" onchange="drawChart()" style="margin-left:10px;">

<canvas id="chart"></canvas>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyD...",
  authDomain:"ethanstradinglog-9d3b8.firebaseapp.com",
  projectId:"ethanstradinglog-9d3b8"
});

const db = getFirestore(app);

let trades=[];
let chart;

window.switchPage=(p,btn)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
if(p==="analytics") setTimeout(drawChart,100);
};

async function loadTrades(){
const snap=await getDocs(collection(db,"trades"));
trades=[];
snap.forEach(d=>{
let t=d.data(); t.id=d.id; trades.push(t);
});
render();
}

window.addTrade=async()=>{
let ts=(date.value&&time.value)?new Date(date.value+"T"+time.value).getTime():Date.now();

let pnl=(+exit.value - +entry.value) * +qty.value;

await addDoc(collection(db,"trades"),{
type:"trade",
pnl,
date:ts
});

loadTrades();
};

window.addBalance=async()=>{
let ts=(date.value&&time.value)?new Date(date.value+"T"+time.value).getTime():Date.now();

let amt=+balanceAmount.value;
if(!amt) return;

await addDoc(collection(db,"trades"),{
type:"balance",
pnl:amt,
date:ts
});

balanceAmount.value="";
loadTrades();
};

window.deleteTrade=async(id)=>{
await deleteDoc(doc(db,"trades",id));
loadTrades();
};

function render(){
tradeTable.innerHTML="";
trades.sort((a,b)=>a.date-b.date).forEach(t=>{
let label=t.type==="balance"?"💰 Balance":"Trade";
tradeTable.innerHTML+=`
<tr>
<td>${label}</td>
<td>$${t.pnl.toFixed(2)}</td>
<td>${new Date(t.date).toLocaleString()}</td>
<td><button onclick="deleteTrade('${t.id}')">Delete</button></td>
</tr>`;
});
drawChart();
}

// 🔥 FIXED ENGINE
window.drawChart=function(){

if(chart) chart.destroy();
if(trades.length===0) return;

let mode=interval.value;
let sorted=[...trades].sort((a,b)=>a.date-b.date);

let labels=[],values=[];

// 🔥 PRE-COMPUTE TRUE EQUITY CURVE
let running=0;
let timeline=[];

sorted.forEach(t=>{
running+=t.pnl;
timeline.push({time:t.date, equity:running});
});

if(mode==="trade"){
labels = timeline.map((_,i)=>"T"+(i+1));
values = timeline.map(p=>p.equity);
}

// 🔥 HOURLY FIX
if(mode==="hour"){
let selected=hourFilter.value;
if(!selected) return;

let start=new Date(selected+"T00:00:00").getTime();

for(let h=0;h<24;h++){
let t=start+h*3600000;

let val=0;
for(let i=0;i<timeline.length;i++){
if(timeline[i].time<=t) val=timeline[i].equity;
}

labels.push(h+":00");
values.push(val);
}
}

// 🔥 DAY/WEEK/MONTH USE SAME ENGINE
function bucket(ms){
if(mode==="day") return new Date(ms).toISOString().slice(0,10);
if(mode==="week"){
let d=new Date(ms);
d.setDate(d.getDate()-d.getDay());
return d.toISOString().slice(0,10);
}
if(mode==="month"){
let d=new Date(ms);
return d.getFullYear()+"-"+(d.getMonth()+1);
}
}

if(mode==="day"||mode==="week"||mode==="month"){
let seen={};

timeline.forEach(p=>{
let key=bucket(p.time);
seen[key]=p.equity;
});

Object.keys(seen).sort().forEach(k=>{
labels.push(k);
values.push(seen[k]);
});
}

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels,
datasets:[{
label:"Equity",
data:values,
borderColor:"#4CAF50",
backgroundColor:"rgba(76,175,80,0.1)",
fill:true
}]
},
options:{
interaction:{mode:'index',intersect:false},
plugins:{legend:{display:false}},
scales:{
x:{ticks:{color:"#aaa"},grid:{color:"#222"}},
y:{ticks:{color:"#aaa",callback:v=>"$"+v},grid:{color:"#222"}}
}
}
});
};

loadTrades();

</script>
</body>
</html>
