<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade Tracker Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0e0e0e; color:#e0e0e0; font-family:'Cascadia Code', monospace; margin:0;}

.nav { display:flex; background:#181818;}
.nav button { flex:1; padding:15px; border:none; background:none; color:#aaa; cursor:pointer;}
.nav button.active { color:white; border-bottom:2px solid #4CAF50;}

.page { display:none; padding:25px;}
.page.active { display:block;}

.card {
background:#181818;
padding:20px;
border-radius:12px;
border:1px solid #2a2a2a;
margin-bottom:20px;
}

.form-grid {
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

input {
padding:10px;
border-radius:6px;
border:1px solid #333;
background:#111;
color:white;
}

.add-btn {
grid-column:span 4;
background:#4CAF50;
border:none;
padding:12px;
cursor:pointer;
}

.balance-btn {
grid-column:span 4;
background:#2196F3;
border:none;
padding:12px;
cursor:pointer;
}

canvas { height:400px !important; }

/* 🔥 AUTH OVERLAY */
#authOverlay {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0e0e0e;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
font-size:20px;
}
</style>
</head>

<body>

<!-- 🔥 AUTH SCREEN -->
<div id="authOverlay">Connecting...</div>

<div class="nav">
<button class="active" onclick="switchPage('dashboard',this)">Dashboard</button>
<button onclick="switchPage('analytics',this)">Analytics</button>
</div>

<div id="dashboard" class="page active">

<div class="card">
<div class="form-grid">

<input id="ticker" placeholder="Ticker">
<input id="entry" type="number" placeholder="Entry">
<input id="exit" type="number" placeholder="Exit">
<input id="qty" type="number" placeholder="Qty">

<input id="date" type="date">
<input id="time" type="time">

<button class="add-btn" onclick="addTrade()">Add Trade</button>

<input id="balanceAmount" type="number" placeholder="Deposit / Withdraw">
<button class="balance-btn" onclick="addBalance()">Add Balance</button>

</div>
</div>

<div class="card">
<table><tbody id="tradeTable"></tbody></table>
</div>

</div>

<div id="analytics" class="page">
<div class="card">
<canvas id="chart"></canvas>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithPopup, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

// 🔥 INIT
const app = initializeApp({
  apiKey:"PASTE_REAL_KEY_HERE",
  authDomain:"ethanstradinglog-9d3b8.firebaseapp.com",
  projectId:"ethanstradinglog-9d3b8"
});

const db = getFirestore(app);
const auth = getAuth(app);

let trades=[];
let chart;

// 🔥 AUTO LOGIN
const provider = new GoogleAuthProvider();

async function autoLogin(){
    try {
        await signInWithPopup(auth, provider);
    } catch(e){
        console.error("Login error:", e);
    }
}

// 🔥 AUTH STATE
onAuthStateChanged(auth, async (user) => {

    if (user) {
        console.log("Logged in:", user.uid);

        document.getElementById("authOverlay").style.display = "none";
        await loadTrades();

    } else {
        await autoLogin();
    }
});

// NAV
window.switchPage=(p,btn)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
};

// LOAD
async function loadTrades(){
const snap = await getDocs(collection(db,"trades"));
trades=[];
snap.forEach(d=>{
let t=d.data(); t.id=d.id; trades.push(t);
});
render();
}

// ADD TRADE
window.addTrade=async()=>{
let ts=(date.value&&time.value)?new Date(date.value+"T"+time.value).getTime():Date.now();

let pnl=(+exit.value - +entry.value) * +qty.value;

await addDoc(collection(db,"trades"),{
type:"trade",
pnl,
date:ts
});

loadTrades();
};

// ADD BALANCE
window.addBalance=async()=>{
let ts=(date.value&&time.value)?new Date(date.value+"T"+time.value).getTime():Date.now();

let amt=+balanceAmount.value;
if(!amt) return;

await addDoc(collection(db,"trades"),{
type:"balance",
pnl:amt,
date:ts
});

balanceAmount.value="";
loadTrades();
};

// DELETE
window.deleteTrade=async(id)=>{
await deleteDoc(doc(db,"trades",id));
loadTrades();
};

// TABLE
function render(){
tradeTable.innerHTML="";
trades.sort((a,b)=>a.date-b.date).forEach(t=>{
let label=t.type==="balance"?"💰 Balance":"Trade";
tradeTable.innerHTML+=`
<tr>
<td>${label}</td>
<td>$${t.pnl.toFixed(2)}</td>
<td>${new Date(t.date).toLocaleString()}</td>
<td><button onclick="deleteTrade('${t.id}')">Delete</button></td>
</tr>`;
});
drawChart();
}

// CHART
function drawChart(){

if(chart) chart.destroy();

let labels=[],values=[],eq=0;

trades.forEach((t,i)=>{
eq+=t.pnl;
labels.push(i);
values.push(eq);
});

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels,datasets:[{data:values,borderColor:"#4CAF50"}]},
options:{
interaction:{mode:'index',intersect:false}
}
});
}

</script>
</body>
</html>
