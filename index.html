<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethan's Trading Log</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0e0e0e; color:#e0e0e0; font-family:'Cascadia Code', monospace; margin:0;}
.nav { display:flex; background:#181818;}
.nav button { flex:1; padding:15px; border:none; background:none; color:#aaa; cursor:pointer;}
.nav button.active { color:white; border-bottom:2px solid #4CAF50;}
.page { display:none; padding:25px;}
.page.active { display:block;}
.card { background:#181818; padding:20px; border-radius:12px; border:1px solid #2a2a2a; margin-bottom:20px;}
.form-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
input { font-size:25px; padding:10px; border-radius:6px; border:1px solid #333; background:#111; color:white;}
.add-btn { grid-column:span 4; background:#4CAF50; border:none; padding:12px; cursor:pointer; color:white;}
.del-btn { grid-column:span 4; background:#d63636; border:none; padding:12px; cursor:pointer; color:white;}
.balance-btn { grid-column:span 4; background:#2196F3; border:none; padding:12px; cursor:pointer; color:white;}
.tf {font-size:25px; padding:10px; border-radius:6px; border:1px solid #333; background:#111; color:white;}
canvas { height:400px !important;}

#googleSignInBtn {
    padding: 16px 28px;
    font-size: 18px;
    border-radius: 10px;
    background: #4285F4;
    color:white;
}

#tradeTable td {
    font-size: 25px;
    padding: 6px;
    font-weight:bold;
}
</style>
</head>

<body>

<button id="googleSignInBtn" onclick="login()">Sign in with Google</button>

<div class="nav">
<button class="active" onclick="switchPage('dashboard',this)">Dashboard</button>
<button onclick="switchPage('analytics',this)">Analytics</button>
</div>

<div id="dashboard" class="page active">
<div class="card">
<div class="form-grid">

<input id="ticker" placeholder="Ticker">
<input id="entry" type="number" placeholder="Entry">
<input id="exit" type="number" placeholder="Exit">
<input id="qty" type="number" placeholder="Qty">

<input id="date" type="date">
<input id="time" type="time">

<button class="add-btn" onclick="addTrade()">Add Trade</button>

<input id="balanceAmount" type="number" placeholder="Deposit / Withdraw">
<button class="balance-btn" onclick="addBalance()">Add Balance</button>

</div>
</div>

<div class="card" id="metricsBar" style="display:flex; justify-content:space-between; font-size:20px; font-weight:bold;">
    <div id="winRate">Win Rate: --</div>
    <div id="sharpe">Sharpe: --</div>
    <div id="return">1Y Return: --</div>
</div>

<div class="card">
<table><tbody id="tradeTable"></tbody></table>
</div>
</div>

<div id="analytics" class="page">
<div class="card">

<select class="tf" id="timeframe" onchange="drawChart()">
<option value="trade">Per Trade</option>
<option value="hour">Hourly</option>
<option value="day">Daily</option>
<option value="week">Weekly</option>
<option value="month">Monthly</option>
</select>

<canvas id="chart"></canvas>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithPopup, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

import zoomPlugin from "https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/+esm";
Chart.register(zoomPlugin);

// 🔥 INIT
const app = initializeApp({
  apiKey:"AIzaSyD2C4DK5VZOJQ6AtmiKmBR9jm7iFS84LN4",
  authDomain:"ethanstradinglog-9d3b8.firebaseapp.com",
  projectId:"ethanstradinglog-9d3b8"
});

const db = getFirestore(app);
const auth = getAuth(app);

const winRate = document.getElementById("winRate");
const sharpe = document.getElementById("sharpe");
const returnEl = document.getElementById("return");

let trades = [];
let chart;

function calculateMetrics(){
console.log("Trades:", trades);

    let tradeOnly = trades.filter(t => t.type !== "balance");

    if(tradeOnly.length === 0){
        winRate.innerText = "Win Rate: --";
        sharpe.innerText = "Sharpe: --";
        returnEl.innerText = "1Y Return: --";
        return;
    }

    // ✅ WIN RATE
    let wins = tradeOnly.filter(t => t.pnl > 0).length;
    let winRateVal = (wins / tradeOnly.length) * 100;

    winRate.innerText = `Win Rate: ${winRateVal.toFixed(1)}%`;

    // ✅ BUILD EQUITY CURVE
    let sorted = [...trades].sort((a,b)=>a.date-b.date);

    let equity = 0;
    let curve = [];

    sorted.forEach(t=>{
        equity += t.pnl;
        curve.push({date: t.date, equity});
    });

    // ✅ DAILY RETURNS (for Sharpe)
    let dailyMap = {};

    curve.forEach(p=>{
        let d = new Date(p.date).toDateString();
        dailyMap[d] = p.equity;
    });

    let dailyValues = Object.values(dailyMap);

    let returns = [];
    for(let i=1;i<dailyValues.length;i++){
        let r = (dailyValues[i] - dailyValues[i-1]) / dailyValues[i-1];
        if(isFinite(r)) returns.push(r);
    }

    // Sharpe (simple, no risk-free rate)
    let avg = returns.reduce((a,b)=>a+b,0) / returns.length || 0;
    let std = Math.sqrt(returns.map(r=>Math.pow(r-avg,2)).reduce((a,b)=>a+b,0)/returns.length) || 1;

    let sharpeVal = (avg / std) * Math.sqrt(252);

    sharpe.innerText = `Sharpe: ${sharpeVal.toFixed(2)}`;

    // ✅ 1 YEAR RETURN
    let now = Date.now();
    let oneYearAgo = now - (365 * 24 * 60 * 60 * 1000);

    let past = curve.find(p => p.date >= oneYearAgo);
    let latest = curve[curve.length - 1];

    let returnPct = past && latest
        ? ((latest.equity - past.equity) / past.equity) * 100
        : 0;

    returnEl.innerText = `1Y Return: ${returnPct.toFixed(2)}%`;
}

// 🔥 LOGIN
window.login = async () => {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
    loadTrades(); // 🔥 force load after login
};

// 🔥 AUTH WATCH
onAuthStateChanged(auth, (user) => {
    loadTrades();
});

// 🔥 NAV
window.switchPage = (p, btn) => {
    document.querySelectorAll(".page").forEach(x => x.classList.remove("active"));
    document.getElementById(p).classList.add("active");
    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
};

// 🔥 LOAD
async function loadTrades(){
    const snap = await getDocs(collection(db,"trades"));
    trades = [];
    snap.forEach(d => {
        let t = d.data();
        t.id = d.id;
        trades.push(t);
    });
    render();
}

// 🔥 ADD TRADE
window.addTrade = async () => {
    let ts = (date.value && time.value)
        ? new Date(date.value + "T" + time.value).getTime()
        : Date.now();

    let pnl = (+exit.value - +entry.value) * +qty.value;

    await addDoc(collection(db,"trades"),{
    type:"trade",
    ticker: ticker.value,
    entry: +entry.value,
    exit: +exit.value,
    pnl,
    date:ts
});

    loadTrades();
};

// 🔥 ADD BALANCE
window.addBalance = async () => {
    let ts = (date.value && time.value)
        ? new Date(date.value + "T" + time.value).getTime()
        : Date.now();

    let amt = +balanceAmount.value;
    if(!amt) return;

    await addDoc(collection(db,"trades"),{
        type:"balance",
        pnl:amt,
        date:ts
    });

    balanceAmount.value = "";
    loadTrades();
};


// 🔥 DELETE
window.deleteTrade = async (id) => {
    if(!confirm("Are you sure you want to delete this entry?")) return;
    await deleteDoc(doc(db,"trades",id));
    loadTrades();
};

// 🔥 TABLE
function render(){
    tradeTable.innerHTML = "";

    trades.sort((a,b)=>a.date-b.date).forEach(t=>{
        let label;

if (t.type === "balance") {
    label = "💰 Balance";
} else {
    let percent = t.entry
        ? ((t.exit - t.entry) / t.entry) * 100
        : 0;

    let color = percent >= 0 ? "#4CAF50" : "#ff5252";

    label = `${t.ticker || "Trade"} 
    <span style="color:${color}; font-weight:bold;">
        (${percent.toFixed(2)}%)
    </span>`;
}
        tradeTable.innerHTML += `
        <tr>
            <td>${label}</td>
            <td>$${t.pnl.toFixed(2)}</td>
            <td>${new Date(t.date).toLocaleString()}</td>
            <td><button onclick="deleteTrade('${t.id}')" class="del-btn">DELETE</button></td>
        </tr>`;
    });

    drawChart();
	calculateMetrics();
}

// 🔥 CHART (GLOBAL FIX)
window.drawChart = function(){

    if(chart) chart.destroy();

    let mode = document.getElementById("timeframe").value;
    let sorted = [...trades].sort((a,b)=>a.date-b.date);

    let labels = [];
    let values = [];
    let eq = 0;

    // PER TRADE (perfect)
    if(mode === "trade"){
        sorted.forEach((t,i)=>{
            eq += t.pnl;
            labels.push(i);
            values.push(eq);
        });
    }

    // TIMEFRAMES
    else{
        let map = {};

        sorted.forEach(t=>{
            eq += t.pnl;

            let d = new Date(t.date);
            let key;

            if(mode==="day"){
                key = d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
            }
            else if(mode==="week"){
                let start = new Date(d);
                start.setDate(d.getDate()-d.getDay());
                key = start.getFullYear()+"-"+(start.getMonth()+1)+"-"+start.getDate();
            }
            else if(mode==="month"){
                key = d.getFullYear()+"-"+(d.getMonth()+1);
            }
            else if(mode==="hour"){
                key = d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()+" "+d.getHours();
            }

            // snapshot equity
            map[key] = eq;
        });

        Object.keys(map)
        .sort((a,b)=>new Date(a)-new Date(b))
        .forEach(k=>{
            labels.push(k);
            values.push(map[k]);
        });
    }

    chart = new Chart(document.getElementById("chart"),{
        type:"line",
        data:{
            labels:labels,
            datasets:[{
                label:"Equity",
                data:values,
                borderColor:"#4CAF50"
            }]
        },
        options:{
            interaction:{mode:'index',intersect:false},
            plugins:{
                legend:{display:false},
                zoom:{
                    pan:{enabled:true,mode:'x'},
                    zoom:{
                        wheel:{enabled:true},
                        pinch:{enabled:true},
                        mode:'x'
                    }
                }
            }
        }
    });
};

</script>
</body>
</html>
